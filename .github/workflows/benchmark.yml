name: Benchmark

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmarks/**'
      - 'package.json'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmarks/**'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build

      # Install competitors for comparison
      - run: npm install --no-save pino winston bunyan

      # Run throughput benchmark and capture output
      - name: Run throughput benchmark
        id: bench
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          node benchmarks/throughput.mjs 2>&1 | tee benchmark-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # Run size benchmark
      - name: Run size benchmark
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          node benchmarks/size.mjs 2>&1 | tee -a benchmark-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # Store benchmark results as artifact
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark-output.txt
          retention-days: 90

      # Post comment on PR with benchmark results
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('benchmark-output.txt', 'utf8');

            // Extract key numbers
            const lines = output.split('\n');
            const konsoleLines = lines.filter(l => l.includes('Konsole'));
            const pinoLines = lines.filter(l => l.includes('Pino'));

            let body = '## Benchmark Results\n\n';
            body += '<details><summary>Full output</summary>\n\n```\n';
            body += output;
            body += '\n```\n</details>';

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Benchmark Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
